name: Bug Report
description: Report a broken feature or unexpected behavior in the demo
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.

  - type: dropdown
    id: which-app
    attributes:
      label: Which part of the project is affected?
      options:
        - Landing page (root index.html)
        - Legacy App (legacy-app/)
        - Modern App (modern-app/)
        - GitHub Actions / CI
        - Documentation
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: When I navigate to the Orders page in the modern app, the status badges are not rendered...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How do we reproduce the issue?
      placeholder: |
        1. Open modern-app in dev mode (`npm run dev`)
        2. Navigate to /orders
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / Environment
      placeholder: "Chrome 123, macOS Sonoma — or: Node 20, npm 10"

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, error messages, console output, etc.
