name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Validate static files ──────────────────────────────────────────────────
  validate-static:
    name: Validate Static Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check required files exist
        run: |
          files=(
            "index.html"
            "landing.css"
            "legacy-app/index.html"
            "legacy-app/style.css"
            "legacy-app/app.js"
            "README.md"
            "LICENSE"
            "SECURITY.md"
          )
          missing=0
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing: $f"
              missing=1
            else
              echo "✅ Found: $f"
            fi
          done
          if [ $missing -ne 0 ]; then
            exit 1
          fi

      - name: Check HTML files are non-empty
        run: |
          for f in index.html legacy-app/*.html; do
            size=$(wc -c < "$f")
            if [ "$size" -lt 100 ]; then
              echo "❌ $f appears too small ($size bytes)"
              exit 1
            fi
            echo "✅ $f ($size bytes)"
          done

  # ── Build modern app ───────────────────────────────────────────────────────
  build-modern-app:
    name: Build Modern App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modern-app

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: modern-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Verify dist output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ dist/ directory not found after build"
            exit 1
          fi
          if [ ! -f "dist/index.html" ]; then
            echo "❌ dist/index.html not found"
            exit 1
          fi
          echo "✅ Build output verified"
          echo "Build size:"
          du -sh dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: modern-app-dist
          path: modern-app/dist/
          retention-days: 7
